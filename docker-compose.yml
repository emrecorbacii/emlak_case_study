version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./case_study_db.sql:/docker-entrypoint-initdb.d/case_study_db.sql:ro
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: case_study
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8888:8888"
    command: ["/bin/bash", "/startup.sh"]

volumes:
  db_data:

